<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Breeze</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-top">
            <span class="header-date" id="header-date"></span>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
                <span class="theme-icon"></span>
            </button>
        </div>
        <div class="header-main">
            <a href="index.html" class="masthead">The Breeze</a>
            <p class="masthead-sub">Dispatches on culture, technology, and the modern world<span class="cursor">_</span></p>
        </div>
        <nav>
            <div class="nav-rule"></div>
            <div class="nav-links">
                <a href="#" onclick="filterPosts('all'); return false;" class="nav-filter active" data-filter="all">All</a>
                <span class="nav-sep">/</span>
                <a href="#" onclick="filterPosts('world-news'); return false;" class="nav-filter" data-filter="world-news">World News</a>
                <span class="nav-sep">/</span>
                <a href="#" onclick="filterPosts('tech'); return false;" class="nav-filter" data-filter="tech">Tech</a>
                <span class="nav-sep">/</span>
                <a href="#" onclick="filterPosts('business'); return false;" class="nav-filter" data-filter="business">Business</a>
                <span class="nav-sep">/</span>
                <a href="#" onclick="filterPosts('opinion'); return false;" class="nav-filter" data-filter="opinion">Opinion</a>
                <span class="nav-sep">/</span>
                <a href="#" onclick="filterPosts('culture'); return false;" class="nav-filter" data-filter="culture">Culture</a>
            </div>
            <div class="nav-rule"></div>
        </nav>
    </header>

    <main>
        <section class="lead-post" id="lead-post"></section>
        <div class="section-rule"></div>
        <section class="posts-grid" id="posts-grid"></section>
        <div class="loading" id="loading">Loading...</div>
        <div class="no-posts" id="no-posts" style="display:none;">
            <p>Nothing here yet.</p>
        </div>
    </main>

    <footer>
        <div class="footer-rule"></div>
        <div class="footer-content">
            <span class="footer-logo">The Breeze</span>
            <span class="footer-copy">&copy; 2026</span>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
